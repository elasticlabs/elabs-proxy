
location /restic/ {
    include /config/nginx/proxy.conf;
    include /config/nginx/snippets/authentik.conf;
    resolver 127.0.0.11 valid=30s;
    set $upstream http://restic-browser:8000;
    proxy_pass $upstream/;
    sub_filter_once off;
    sub_filter 'href="/' 'href="/restic/';
    sub_filter 'src="/' 'src="/restic/';
}
