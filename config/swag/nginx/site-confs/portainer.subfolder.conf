
location /portainer/ {
    include /config/nginx/proxy.conf;
    include /config/nginx/snippets/authentik.conf;
    resolver 127.0.0.11 valid=30s;
    set $upstream http://portainer:9000;
    proxy_pass $upstream/;
    sub_filter_once off;
    sub_filter 'href="/' 'href="/portainer/';
    sub_filter 'src="/' 'src="/portainer/';
}
