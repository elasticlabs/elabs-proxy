# Source:
# - https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview/
# Runtime Docker DNS resolution avoids nginx startup failure when oauth2-proxy is temporarily unavailable.

location = /oauth2/auth {
    internal;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $oauth2_proxy_upstream http://oauth2-proxy:4180;

    proxy_pass $oauth2_proxy_upstream/oauth2/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Uri $request_uri;
    proxy_set_header X-Forwarded-Method $request_method;
}

location /oauth2/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $oauth2_proxy_upstream http://oauth2-proxy:4180;

    proxy_pass $oauth2_proxy_upstream;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Uri $request_uri;
}