
services:
  #
  # Reverse Proxy
  #
  swag-proxy:
    image: lscr.io/linuxserver/swag
    container_name: ${COMPOSE_PROJECT_NAME}_swag
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${PWD}/config/swag:/config
    environment:
      - PUID=1000
      - PGID=1000
      - URL=${VIRTUAL_HOST}
      - EMAIL=${CERTBOT_EMAIL}
      - SUBDOMAINS=${SUBDOMAINS}
      - ONLY_SUBDOMAINS=false
    cap_add:
      - NET_ADMIN
    networks:
      - revproxy_admin
      - revproxy_apps

  #
  # Admin & Monitoring
  #
  portainer:
    image: portainer/portainer-ce:latest
    container_name: ${COMPOSE_PROJECT_NAME}_portainer
    command: -H unix:///var/run/docker.sock
    restart: always
    expose:
      - "9000"
    volumes:
      - ${PWD}/config/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - revproxy_admin

  homepage: # optionnel si tu veux garder un dashboard visuel
    image: ghcr.io/benphelps/homepage:latest
    container_name: ${COMPOSE_PROJECT_NAME}_homepage
    restart: always
    expose:
      - "3000"
    volumes:
      - ${PWD}/config/homepage:/app/config
      - html:/app/public
    networks:
      - revproxy_admin

  #
  # Apps
  #
  code-server:
    image: codercom/code-server:latest
    container_name: ${COMPOSE_PROJECT_NAME}_code
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD}
    volumes:
      - ${PWD}/config/code:/home/coder/project
    networks:
      - revproxy_apps

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: ${COMPOSE_PROJECT_NAME}_openobserve
    restart: unless-stopped
    expose:
      - "5080"
    volumes:
      - ${PWD}/config/openobserve:/data
    networks:
      - revproxy_apps

  restic-browser:
    image: emuell/restic-browser:latest
    container_name: ${COMPOSE_PROJECT_NAME}_restic_browser
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - RB_REPO=/data/restic
      - RB_PASSWORD=${RESTIC_PASSWORD}
    volumes:
      - backup_data:/data
    networks:
      - revproxy_apps

  #
  # Authentik (SSO)
  #
  authentik:
    image: ghcr.io/goauthentik/server:latest
    container_name: ${COMPOSE_PROJECT_NAME}_authentik
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_POSTGRESQL__HOST=authentik-db
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_POSTGRESQL__NAME=authentik
    volumes:
      - ${PWD}/config/authentik:/data
    depends_on:
      - authentik-db
    networks:
      - revproxy_admin

  authentik-db:
    image: postgres:12-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_authentik_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=authentik
      - POSTGRES_PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - POSTGRES_DB=authentik
    volumes:
      - ${PWD}/config/authentik-db:/var/lib/postgresql/data
    networks:
      - revproxy_admin

  #
  # Backups
  #
  docker-volume-backup:
    image: offen/docker-volume-backup
    container_name: ${COMPOSE_PROJECT_NAME}_backup
    restart: always
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_METHOD: restic
      RESTIC_REPOSITORY: /backups/restic
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      RESTIC_FORGET_ARGS: "--keep-daily 7 --keep-weekly 4 --keep-monthly 3"
      RESTIC_CHECK: "true"
    volumes:
      - backup_data:/backups
      - ${PWD}/config/portainer:/backup/portainer:ro
      - ${PWD}/config/authentik:/backup/authentik:ro
      - ${PWD}/config/openobserve:/backup/openobserve:ro
      - ${PWD}/config/code:/backup/code:ro

#
# Networks & Volumes
#
networks:
  revproxy_admin:
    name: revproxy_admin
    external: true
  revproxy_apps:
    name: revproxy_apps
    external: true

volumes:
  html:
  backup_data:
  revproxy_apps:
    name: revproxy_apps
    external: true
